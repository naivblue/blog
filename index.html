<style>
:root{--bg:#f5f1e8;--paper:#fffefa;--panel:#ffffff;--ink:#14233a;--body:#405064;--muted:#758297;--line:#dfe3e6;--teal:#087f78;--blue:#245ea8;--gold:#a66a12;--rose:#b64b61;--shadow:0 16px 45px rgba(35,48,68,.09),0 2px 8px rgba(35,48,68,.05)}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;color:var(--ink);background:radial-gradient(circle at 82% 0%,rgba(36,94,168,.08),transparent 31%),radial-gradient(circle at 0% 34%,rgba(8,127,120,.06),transparent 28%),linear-gradient(180deg,#faf8f3,var(--bg));font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;line-height:1.78;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--blue);text-decoration:none}
.hero{max-width:1080px;margin:0 auto;padding:78px 34px 30px}
.eyebrow{display:inline-flex;gap:9px;align-items:center;padding:7px 12px;border:1px solid rgba(8,127,120,.26);border-radius:999px;color:var(--teal);background:rgba(255,255,255,.65);font-size:12px;font-weight:800;letter-spacing:.14em}
.eyebrow:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 5px rgba(8,127,120,.1)}
h1{margin:24px 0 14px;font-size:clamp(38px,6vw,68px);line-height:1.08;letter-spacing:-.052em;color:#10233d}
.hero-subtitle{max-width:680px;color:#52627a;font-size:clamp(16px,2vw,20px);line-height:1.55}
.list{max-width:1080px;margin:0 auto;padding:30px 34px 110px;display:grid;gap:18px}
.card{display:block;padding:28px 30px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.94);box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-3px);box-shadow:0 22px 55px rgba(35,48,68,.13),0 3px 10px rgba(35,48,68,.06);text-decoration:none}
.card-meta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:12px;letter-spacing:.04em}
.card-date{color:var(--teal);font-weight:800;font-variant-numeric:tabular-nums}
.card h2{margin:13px 0 10px;font-size:clamp(22px,3vw,30px);line-height:1.22;letter-spacing:-.035em;color:#152a45}
.card p{margin:0 0 16px;color:var(--body);font-size:15px;line-height:1.7}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{padding:5px 11px;border:1px solid rgba(8,127,120,.22);border-radius:999px;background:rgba(8,127,120,.05);color:#146f6b;font-size:11px;font-weight:700;letter-spacing:.03em}
.footer{max-width:1080px;margin:0 auto;padding:0 34px 60px;color:#8893a3;font-size:12px;border-top:1px solid var(--line);padding-top:22px}
@media(max-width:580px){.hero{padding:52px 18px 24px}.list{padding:24px 18px 80px}.card{padding:22px 20px;border-radius:16px}}
